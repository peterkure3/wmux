name: release

# Pushing a v* tag builds stamped wmux/wmuxd binaries for both deploy
# targets (Windows-native and WSL/linux) and attaches them to a GitHub
# release. CI proper lives in test.yml; this re-runs vet+race+test at the
# tagged commit anyway since tags don't trigger the test workflow.
#
# Supply-chain posture (audited 2026-07-17): same rules as test.yml —
# first-party actions only, SHA-pinned, persist-credentials off, go mod
# verify before building. contents:write is granted only to this job (the
# minimum for `gh release create`), and a SHA256SUMS file is published
# alongside the archives so consumers can detect a tampered asset.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release + upload assets
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: stable

      - run: go mod verify
      - run: go vet ./...
      - run: go test -race -count=1 ./...

      - name: build and package
        run: |
          VER="${GITHUB_REF_NAME}"
          # -X path follows go.mod's module name (peterkure, no 3) — see
          # internal/version.
          LD="-X github.com/peterkure/wmux/internal/version.Version=${VER}"
          for os in windows linux; do
            ext=""
            [ "$os" = windows ] && ext=".exe"
            mkdir -p "dist/$os-amd64"
            GOOS=$os GOARCH=amd64 go build -trimpath -ldflags "$LD" -o "dist/$os-amd64/wmux$ext"  ./cmd/wmux
            GOOS=$os GOARCH=amd64 go build -trimpath -ldflags "$LD" -o "dist/$os-amd64/wmuxd$ext" ./cmd/wmuxd
          done
          (cd dist/windows-amd64 && zip "../wmux_${VER}_windows-amd64.zip" wmux.exe wmuxd.exe)
          tar -C dist/linux-amd64 -czf "dist/wmux_${VER}_linux-amd64.tar.gz" wmux wmuxd
          (cd dist && sha256sum "wmux_${VER}_windows-amd64.zip" "wmux_${VER}_linux-amd64.tar.gz" > SHA256SUMS)

      - name: create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "dist/wmux_${GITHUB_REF_NAME}_windows-amd64.zip" \
            "dist/wmux_${GITHUB_REF_NAME}_linux-amd64.tar.gz" \
            dist/SHA256SUMS \
            --title "$GITHUB_REF_NAME" --generate-notes
