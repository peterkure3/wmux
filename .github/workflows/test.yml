name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Linux runner gets the race detector (needs cgo; the Windows dev
  # machine has no gcc) and matches the bin/linux-amd64 build target.
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - run: go vet ./...
      - run: go build ./...
      - run: go test -race -count=1 ./...

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - run: go vet ./...
      - run: go build ./...
      - run: go test -count=1 ./...
